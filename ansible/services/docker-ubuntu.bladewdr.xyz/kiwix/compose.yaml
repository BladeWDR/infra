---
volumes:
  kiwix-data:
    labels:
      - remove_volume_on=down
    driver_opts:
      type: nfs
      o: "addr=nas01.bladewdr.xyz,nolock,noatime,soft,rw"
      device: ":/mnt/tank/kiwix"

networks:
  proxy:
    external: true

services:
  kiwix-serve:
    container_name: kiwix
    image: ghcr.io/kiwix/kiwix-serve:3.8.1@sha256:b14c651db9e337da1cc4ccbc38167f259bcb621c3fb6fd1eeab8d2555aaf1e5d
    networks:
      - proxy
    volumes:
      - kiwix-data:/data
    command:
      - '*.zim'
