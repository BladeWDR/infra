---
services:
  netalertx:
    network_mode: host
    restart: unless-stopped
    read_only: true
    mem_limit: 2048m
    mem_reservation: 1024m
    cpu_shares: 512
    pids_limit: 512
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
      - NET_ADMIN
      - NET_BIND_SERVICE
    volumes:
      - type: bind
        source: ./netalertx/data
        target: /data
        read_only: false
      - type: tmpfs
        target: /app/api
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
    environment:
      - PUID=200
      - PGID=300
      - TZ={{ host_timezone }}
      - PORT=20211
    container_name: netalertx
    image: jokobsk/netalertx:26.1.17@sha256:effae612fe9dd55e0ded482d340425dcd720b8898d37bd3bc3dc4be7b3598b28
    tmpfs:
      - "/tmp:uid=20211,gid=20211,mode=1700,rw,noexec,nosuid,nodev,async,noatime,nodiratime"
