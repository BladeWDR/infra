---
services:
  netalertx:
    network_mode: host
    restart: unless-stopped
    read_only: true
    mem_limit: 2048m
    mem_reservation: 1024m
    cpu_shares: 512
    pids_limit: 512
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    volumes:
      - type: bind
        source: ./netalertx/data
        target: /data
        read_only: false
      - type: tmpfs
        target: /app/api
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
    environment:
      - PUID=200
      - PGID=300
      - TZ={{ host_timezone }}
      - PORT=20211
    container_name: netalertx
    image: jokobsk/netalertx:26.3.15@sha256:fe9d81abd6d94bf2400b5bd8eb1c9bb51bb8419b64a85c644aa0d260f30f6412
    tmpfs:
      - "/tmp:mode=1777,rw,noexec,nosuid,nodev,async,noatime,nodiratime"
